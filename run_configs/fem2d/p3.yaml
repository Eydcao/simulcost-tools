defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Case type
case: "twisting_column"

# Tunable Parameters
nx: 20
dt: 0.001
# newton_v_res_tol: velocity-like residual tolerance for Newton convergence
# Convergence criterion: |Δx|/dt < newton_v_res_tol, where Δx is position correction
newton_v_res_tol: 0.01

# Environmental Parameters
dim: 2
E: 1e5
nu: 0.3
density: 1.0
envs_params:
  Lx: 2.0
  Ly: 10.0
  gravity: 0.0
  initial_twist_amplitude: 1.0
mesh_scale: 1.0
mesh_offset:
  - 0.0
  - 0.0

# Simulator statics
record_dt: 0.2
end_frame: 20
max_newton_iter: 10

dump_dir: "sim_res/fem2d/p3"
verbose: False
