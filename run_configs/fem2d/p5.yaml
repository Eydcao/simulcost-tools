defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Case type
case: "twisting_column"

# Tunable Parameters
dx: 0.1
# cfl: CFL number for automatic dt calculation
# Time step will be computed as: dt = cfl * dx / wave_speed
# where wave_speed = sqrt((lambda + 2*mu) / rho)
cfl: 0.5

# Environmental Parameters
dim: 2
E: 1e5
nu: 0.3
density: 1.0
envs_params:
  Lx: 2.0
  Ly: 10.0
  gravity: 0.0
  initial_twist_amplitude: 2.5  # Increased from 1.0 in p3 - stronger rotational dynamics
  newton_v_res_tol: 0.01
mesh_scale: 1.0
mesh_offset:
  - 0.0
  - 0.0

# Simulator statics
record_dt: 0.08
end_frame: 7
max_newton_iter: 10
max_wall_time: 120  # Maximum wall time in seconds (hard limit, 2x safety margin)

dump_dir: "sim_res/fem2d/p5"
verbose: False
