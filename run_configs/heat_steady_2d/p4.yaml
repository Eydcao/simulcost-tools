defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Physical parameters
Lx: 1.0          # Domain length in x
Ly: 1.0          # Domain length in y

# Boundary conditions
T_top: 0.5       # Fixed top boundary temperature
T_bottom: 0.5    # Fixed bottom boundary temperature
T_left: 1.0      # Fixed left boundary temperature
T_right: 0.0     # Fixed right boundary temperature

# Controllable parameters
dx: 0.01         # Grid spacing (determines resolution)
relax: 1.0       # SOR relaxation parameter
error_threshold: 1e-8  # Convergence threshold
T_init: 0.25      # Initial temperature field

# Simulator statics
record_dt: 100   # Time interval between recordings (iterations)
end_frame: 50    # Simulation end after certain number of frames

# Output configuration
dump_dir: "sim_res/heat_steady_2d/p4"  # Directory for output files
verbose: False   # Enable verbose output