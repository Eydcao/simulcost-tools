defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Physical parameters

# Numerical parameters
dx: 0.01          # Number of spatial points
relax: 1.0        # Relaxation factor
error_threshold: 1e-6    # Error threshold for convergence

# Simulator statics
record_dt: 100        # Time interval between recordings [s]
end_frame: 100000     # Simulation end after certain number of frames

# Output configuration
dump_dir: "sim_res/heat_steady_2d/p1"  # Directory for output files
verbose: False          # Enable verbose output