defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Physical parameters
T_top: 0.16       # Fixed top boundary temperature
T_bottom: 0.16      # Fixed bottom boundary temperature
T_left: 0.06       # Fixed left boundary temperature
T_right: 0.87      # Fixed right boundary temperature

# Numerical parameters
dx: 0.01          # Number of spatial points
relax: 0.5        # Relaxation factor
error_threshold: 1e-8    # Error threshold for convergence
T_init: 0.0         # Initial temperature

# Simulator statics
record_dt: 10000        # Time interval between recordings [s]
end_frame: 100000     # Simulation end after certain number of frames

# Output configuration
dump_dir: "sim_res/heat_steady_2d/p3"  # Directory for output files
verbose: False          # Enable verbose output