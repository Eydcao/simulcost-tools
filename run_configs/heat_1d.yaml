defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Physical parameters
L: 1.0                # Wall thickness [m]
k: 0.5                # Thermal conductivity [W/m-K]
h: 10.0               # Convection coefficient [W/m²-K]
rho: 1000.0           # Density [kg/m³]
cp: 1000.0            # Specific heat [J/kg-K]
T_inf: 300.0          # Ambient temperature [K]
T_init: 500.0         # Initial temperature [K]

# Numerical parameters
n_space: 100          # Number of spatial points
cfl: 0.5              # CFL number for stability
record_dt: 1.0        # Time interval between recordings [s]
end_time: 10.0        # Simulation end time [s]

# Output configuration
dump_dir: "output/heat_1d"  # Directory for output files
verbose: True          # Enable verbose output