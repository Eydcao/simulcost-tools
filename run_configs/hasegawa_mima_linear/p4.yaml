defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Environmental/Physics parameters (fixed)
case: "gauss_x_sin_y"           # Case identifier
L: 62.83185307179586       # Domain size (2*pi*10)
v_star: 0.02               # Diamagnetic drift velocity (2e-2)
Dx: 5.0                    # Initial condition spatial scale

# Tunable parameters
N: 256                     # Grid resolution (main accuracy parameter)
dt: 10.0                   # Time step (main efficiency parameter)
cg_atol: 1.0e-8           # CG solver absolute tolerance
cg_maxiter: 1000          # CG solver maximum iterations

# Method selection
analytical: false          # Use analytical solution (true) or numerical (false)

# Simulator statics
record_dt: 1000           # Time interval between recordings (used by base solver)
end_frame: 10             # Number of recording frames (end_time = record_dt * end_frame)

# Output configuration
dump_dir: "sim_res/hasegawa_mima_linear/p4"  # Directory for output files

verbose: false            # Enable verbose output

max_wall_time: 60          # Maximum wall time in seconds (hard limit)
