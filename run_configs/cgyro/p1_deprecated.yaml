defaults:
 - _self_
 - override hydra/hydra_logging: none
 - override hydra/job_logging: none


# Scenario parameters =============
# Temperature ratio (? not sure what this is called)
# Per-species parameters (assumes 3 species)
dens_1: 1
dens_2: 1
dens_3: 1
dlnndr_1: 1
dlnndr_2: 1
dlnndr_3: 1
dlntdr_1: 1
dlntdr_2: 1
dlntdr_3: 1
mass_1: 1
mass_2: 1
mass_3: 1
temp_1: 1
temp_2: 1
temp_3: 1
z_1: 1
z_2: 1
z_3: 1


# Plasma shaping parameters
equilibrium_model: 2
rmin: 0.5
rmaj: 3.0
shift: 0.0
kappa: 1.0
s_kappa: 0.0
delta: 0.0
s_delta: 0.0
zeta: 0.0
s_zeta: 0.0
zmag: 0.0
dzmag: 0.0
q: 2.0
s: 1.0
btccw: -1.0
ipccw: -1.0
udsym_flag: 1
gamma_e: 0.0
gamma_e_scale: 1.0
gamma_p: 0.0
gamma_p_scale: 1.0
mach: 0.0
mach_scale: 1.0
nu_ee: 0.1
px0: 0.0


# Advanced shape parameters
shape_cos0: 0.0
shape_s_cos0: 0.0
shape_cos1: 0.0
shape_s_cos1: 0.0
shape_cos2: 0.0
shape_s_cos2: 0.0
shape_cos3: 0.0
shape_s_cos3: 0.0
shape_sin3: 0.0
shape_s_sin3: 0.0


# Beta
betae_unit: 0.0
beta_unit_scale: 0.0
beta_star_scale: 1.0
lambda_debye: 0.0
lambda_debye_scale: 0.0


# Collisionality
collision_model: 1    # use as env var
collision_field_model: 1
collision_ene_restore: 1
collision_precision_mode: 0


# Tunable parameters ===============
n_field: 1   # may be more environmental (e.g. if on edge, use 3 fields, o.w. use 2 fields)
n_species: 1 # may be more environmental
n_toroidal: 1 # always 1 for linear case (we only care about linear)
n_xi: 16    # keep fixed, not particularly informative
n_energy: 8 # same as above
delta_t: 0.01   # let cgyro determine delta_t for adaptive timesteps, don't tune on our end
               # ensure adaptive timestepping is enabled
n_radial: 4  # \in [8, 12]
           # -- should be solvable by refinement
n_theta: 24 # \in [16, 32] (determined by plasma shaping) (num points along field line) (for R/A = 0.5 \in [16, 24], at edge R/A = 0.95 \in [32, or more])
           # -- should be solvable by refinement
ky: 0.3     # eigenvalues specific to each ky
           #


# Static parameters --- fix to defaults
# up_radial: 1.0
# up_theta: 1.0
# up_alpha: 0.0
# nup_radial: 3
# nup_theta: 3
# nup_alpha: 3
# upwind_single_flag: 0


# Simulator statics
box_size: 1
# e_max: 8.0 (unused, fix at default)
# nl_single_flag: 0 (unused)
delta_t_method: 1 # for adaptive timesteps
theta_plot: 1
error_tol: 1e-4 #TODO: THIS MAY BE TUNABLE
max_time: 1.0
freq_tol: 0.001
print_step: 100
restart_step: 10
profile_model: 1
quasineutral_flagL: 1
nonlinear_flag: 0
zf_test_mode: 0
silent_flag: 0
amp: 0.1
amp0: 0.0


# Output configuration
dump_dir: "sim_res/cgyro/p1"  # Directory for output files
verbose: False                # Enable verbose output
