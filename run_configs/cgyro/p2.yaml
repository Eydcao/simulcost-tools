defaults:
 - _self_
 - override hydra/hydra_logging: none
 - override hydra/job_logging: none

# Scenario / environment parameters ===============
collision_model: 4   
ky: 0.05
n_field: 2   # (if on edge, use 3 fields, o.w. use 2 fields)
max_time: 500

# Tunable parameters ===============
n_radial: 4
             
n_theta: 12 
         
error_tol: 1e-6
      
freq_tol: 1e-5

delta_t: 1e-2

delta_t_method: 1

profile_model: 1

# Output configuration
dump_dir: "sim_res/cgyro/p2"  # Directory for output files
verbose: False                # Enable verbose output
