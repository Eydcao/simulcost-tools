defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Static parameters
L: 0.125                # Wall thickness [m]
k: 0.68                # Thermal conductivity [W/m-K]
h: 1.81               # Convection coefficient [W/m²-K]
rho: 1758           # Density [kg/m³]
cp: 803            # Specific heat [J/kg-K]
T_inf: 6          # Ambient temperature [K]
T_init: 21         # Initial temperature [K]

# Tunable parameters
n_space: 1000          # Number of spatial points
cfl: 1.0              # CFL number for stability

# Simulator statics
record_dt: 10        # Time interval between recordings [s]
end_frame: 24        # Simulation end after certain number of frames

# Output configuration
dump_dir: "sim_res/heat_1d/p43"  # Directory for output files
verbose: False          # Enable verbose output