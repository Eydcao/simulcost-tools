defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Static parameters
L: 0.17                # Wall thickness [m]
k: 0.74                # Thermal conductivity [W/m-K]
h: 36.85               # Convection coefficient [W/m²-K]
rho: 1098           # Density [kg/m³]
cp: 898            # Specific heat [J/kg-K]
T_inf: 12          # Ambient temperature [K]
T_init: 23         # Initial temperature [K]

# Tunable parameters
n_space: 1000          # Number of spatial points
cfl: 1.0              # CFL number for stability

# Simulator statics
record_dt: 40        # Time interval between recordings [s]
end_frame: 24        # Simulation end after certain number of frames

# Output configuration
dump_dir: "sim_res/heat_1d/p44"  # Directory for output files
verbose: False          # Enable verbose output