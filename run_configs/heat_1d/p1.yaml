defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Static parameters
L: 0.15                # Wall thickness [m]
k: 1.0                # Thermal conductivity [W/m-K]
h: 1000.0               # Convection coefficient [W/m²-K]
rho: 1500.0           # Density [kg/m³]
cp: 1000.0            # Specific heat [J/kg-K]
T_inf: 12.0          # Ambient temperature [K]
T_init: 25.0         # Initial temperature [K]

# Tunable parameters
n_space: 1000          # Number of spatial points
cfl: 1.0              # CFL number for stability

# Simulator statics
record_dt: 10.0        # Time interval between recordings [s]
end_frame: 24        # Simulation end after certain number of frames

# Output configuration
dump_dir: "sim_res/heat_1d/p1"  # Directory for output files
verbose: False          # Enable verbose output