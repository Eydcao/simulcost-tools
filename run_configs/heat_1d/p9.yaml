defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Physical parameters
L: 0.12                # Wall thickness [m]
k: 0.52                # Thermal conductivity [W/m-K]
h: 0.18               # Convection coefficient [W/m²-K]
rho: 1325           # Density [kg/m³]
cp: 878            # Specific heat [J/kg-K]
T_inf: 8          # Ambient temperature [K]
T_init: 28         # Initial temperature [K]

# Numerical parameters
n_space: 1000          # Number of spatial points
cfl: 1.0              # CFL number for stability

# Simulator statics
record_dt: 30        # Time interval between recordings [s]
end_frame: 24        # Simulation end after certain number of frames

# Output configuration
dump_dir: "sim_res/heat_1d/p9"  # Directory for output files
verbose: False          # Enable verbose output