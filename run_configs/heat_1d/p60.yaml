defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Static parameters
L: 0.137                # Wall thickness [m]
k: 0.64                # Thermal conductivity [W/m-K]
h: 77.0               # Convection coefficient [W/m²-K]
rho: 1869           # Density [kg/m³]
cp: 845            # Specific heat [J/kg-K]
T_inf: 19          # Ambient temperature [K]
T_init: 21         # Initial temperature [K]

# Tunable parameters
n_space: 1000          # Number of spatial points
cfl: 1.0              # CFL number for stability

# Simulator statics
record_dt: 80        # Time interval between recordings [s]
end_frame: 24        # Simulation end after certain number of frames

# Output configuration
dump_dir: "sim_res/heat_1d/p60"  # Directory for output files
verbose: False          # Enable verbose output