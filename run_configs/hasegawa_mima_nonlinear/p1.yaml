defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# Environmental/Physics parameters (fixed)
case: "monopole"           # Case identifier
L: 62.83185307179586       # Domain size (2*pi*10)
v_star: 0.02               # Diamagnetic drift velocity (2e-2)
Dx: 5.0                    # Initial condition spatial scale

# Tunable parameters
N: 128                     # Grid resolution (main accuracy parameter)
dt: 10.0                   # Time step (main efficiency parameter)

# Simulator statics
record_dt: 1000             # Time interval between recordings (used by base solver)
end_frame: 10              # Number of recording frames (end_time = record_dt * end_frame)

# Output configuration
dump_dir: "sim_res/hasegawa_mima_nonlinear/p1"  # Directory for output files
verbose: false            # Enable verbose output
max_wall_time: 120         # Maximum wall time in seconds (hard limit)
