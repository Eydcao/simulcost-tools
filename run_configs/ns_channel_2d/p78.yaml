defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

# -------- Environment Dependents --------
length: 28.11
breadth: 0.64
mu: 0.01937
rho: 4.79
boundary_condition: "cube_driven_flow"  # Options: "channel_flow", "back_stair_flow", "expansion_channel", "cube_driven_flow"

# -------- Criteria --------
mass_conservation_threshold: 1e-8

# -------- Tunable Parameters --------
mesh_x: 250
mesh_y: 50
omega_u: 0.7
omega_v: 0.7
omega_p: 0.3
diff_u_threshold: 1e-7
diff_v_threshold: 1e-7

res_iter_v_threshold: "exp_decay"

# -------- Output --------
dump_dir: "sim_res/ns_channel_2d/p78"
verbose: False
other_params: 
  wall_height: 15
  wall_width: 11
  wall_start_height: 23
  wall_start_width: 79

