solver_info:
  analytical_method: Spectral solution via 2D FFT
  name: Hasegawa-Mima Linear
  numerical_method: RK4 time integration with CG solver for Helmholtz equation
  reference: Hasegawa, A. & Mima, K. (1978). Pseudo-three-dimensional turbulence in
    magnetized nonuniform plasma.
target_parameters:
  N:
    description: Grid resolution - determines spatial accuracy and computational cost
    initial_value: 64
    max_iteration_num: 3
    multiplication_factor: 2
    non_target_parameters:
      cg_atol:
      - 1e-4
      - 1e-5
      - 1e-6
      dt:
      - 5.0
      - 10.0
      - 20.0
    search_type: iterative+0-shot
  cg_atol:
    description: Conjugate Gradient solver absolute tolerance - controls linear solver
      accuracy
    max_iteration_num: 3
    multiplication_factor: 2
    non_target_parameters:
      N: 128
      dt:
      - 5.0
      - 10.0
      - 20.0
    search_range:
    - 1e-8
    - 1e-3
    search_range_slice_num: 4
    search_type: 0-shot
  dt:
    description: Time step size - controls temporal accuracy and numerical stability
    initial_value: 10.0
    max_iteration_num: 3
    multiplication_factor: 0.5
    non_target_parameters:
      N: 128
      cg_atol:
      - 1e-4
      - 1e-5
      - 1e-6
    search_type: iterative+0-shot
task_distribution:
  strategy: flexible_parameters
  total_individuals: 108
