# CGYRO Solver Checkout Configuration
# This file centralizes all parameter settings for both documentation and dummy solution generation

solver_info:
  name: "CGYRO"
  numerical_method: "Gyrokinetic"
  reference: "[Literature or standard benchmarks]"

task_distribution:
  strategy: "benchmark"
  total_individuals: 243
  description: "1 profile * 3 precision levels * (3^5 * 4 target parameter combinations) = 2916 tasks"

precision_levels:
  low:
    comparison_tolerance: 1e-3
  medium:
    comparison_tolerance: 1e-4
  high:
    comparison_tolerance: 1e-5

profiles:
  num_profiles: 4
  # Available profiles: p1 (ion scale), p2 (microtearing scale), p3 (electron scale), p4 (trapped electron scale)
  active_profiles: ["p1", "p2", "p3", "p4"]

# Parameter configurations for each target parameter
target_parameters:
  n_radial:
    description: "Controls number of radial locations"
    search_type: "iterative+0-shot"
    initial_value: 4
    multiplication_factor: 2
    max_iteration_num: 3
    non_target_parameters:
      n_theta: 24
      n_xi: 16
      n_energy: 8
      error_tol: 1e-4
      freq_tol: 1e-3
      delta_t: 1e-2

  n_theta:
    description: "Controls number of theta locations"
    search_type: "iterative+0-shot"
    initial_value: 6
    multiplication_factor: 2
    max_iteration_num: 3
    non_target_parameters:
      n_radial: 8
      n_xi: 16
      n_energy: 8
      error_tol: 1e-4
      freq_tol: 1e-3
      delta_t: 1e-2
  
  n_xi:
    description: "Controls number of pitch angle meshpoints"
    search_type: "iterative+0-shot"
    initial_value: 6
    multiplication_factor: 2
    max_iteration_num: 4
    non_target_parameters:
      n_radial: 8
      n_theta: 24
      n_energy: 8
      error_tol: 1e-4
      freq_tol: 1e-3
      delta_t: 1e-2
  
  n_energy:
    description: "Controls number of energy meshpoints"
    search_type: "iterative+0-shot"
    initial_value: 4
    multiplication_factor: 2
    max_iteration_num: 3
    non_target_parameters:
      n_radial: 8
      n_theta: 24
      n_xi: 16
      error_tol: 1e-4
      freq_tol: 1e-3
      delta_t: 1e-2
  
  freq_tol:
    description: "Controls error tolerance for eigenvalue convergence"
    search_type: "iterative+0-shot"
    initial_value: 1e-5
    multiplication_factor: 10
    max_iteration_num: 3
    non_target_parameters:
      n_radial: 8
      n_theta: 24
      n_xi: 16
      n_energy: 8
      error_tol: 1e-4
      delta_t: 1e-2
  
  delta_t:
    description: "Controls initial timestep size for adaptive timestepping procedure"
    search_type: "iterative+0-shot"
    initial_value: 1e-2
    multiplication_factor: 2
    max_iteration_num: 3
    non_target_parameters:
      n_radial: 8
      n_theta: 24
      n_xi: 16
      n_energy: 8
      error_tol: 1e-4
      freq_tol: 1e-3

