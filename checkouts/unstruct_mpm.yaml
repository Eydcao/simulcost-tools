# Unstruct MPM Checkout Configuration
# This file centralizes all parameter settings for both documentation and dummy solution generation

solver_info:
  name: "Unstruct MPM"
  numerical_method: "Unstructured Material Point Method with Taichi-based particle simulation"
  reference: "Taichi-based MPM simulation with configurable cases and parameters"

task_distribution:
  strategy: "benchmark"
  total_individuals: 180
  description: "3 profiles * 3 precision levels * 20 non-target combos = 180 tasks"

precision_levels:
  high:
    energy_tolerance: 0.01
    var_threshold: 0.2
    description: "High precision energy convergence - very challenging"
  medium:
    energy_tolerance: 0.08
    var_threshold: 0.5
    description: "Medium precision energy convergence - challenging"
  low:
    energy_tolerance: 0.3
    var_threshold: 0.6
    description: "Low precision energy convergence - achievable"

profiles:
  num_profiles: 3
  active_profiles: ["p1", "p2", "p3"]
  # Profile descriptions based on simulation cases
  # p1: cantilever beam simulation
  # p2: vibration bar simulation  
  # p3: disk collision simulation
  # Profiles are loaded dynamically from run_configs/unstruct_mpm/{profile}.yaml

# Target parameters for optimization
target_parameters:
  nx:
    search_type: "0-shot"
    exact_values: [20, 40, 80, 100, 120]
    non_target_parameters:
      n_part: [2, 4]
      cfl: 0.001
      radii: [1.5, 2.0]

  n_part:
    search_type: "iterative+0-shot"
    initial_value: 1
    multiplication_factor: 2.0
    max_iteration_num: 5
    non_target_parameters:
      nx: [50, 100]
      cfl: 0.001
      radii: [1.5, 2.0]

  cfl:
    search_type: "iterative+0-shot"
    initial_value: 0.01 # Should ALWAYS be less than 0.01 to avoid divergence
    multiplication_factor: 0.5
    max_iteration_num: 5
    non_target_parameters:
      nx: [50, 100]
      n_part: [2, 4]
      radii: [1.5, 2.0]

  radii:
    search_type: "0-shot"
    search_range: [1.3, 2.0]
    search_range_slice_num: 8
    non_target_parameters:
      nx: [50, 100]
      n_part: [2, 4]
      cfl: 0.001

# Non-target parameter combinations
non_target_combinations:
  # Base parameter values for reference
  base_parameters:
    base_nx: 40
    base_n_part: 2
    base_cfl: 0.001
    base_radii: 1.5
    base_var_threshold: 0.1
