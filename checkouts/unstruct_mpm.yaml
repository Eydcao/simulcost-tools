# Unstruct MPM Checkout Configuration
# This file centralizes all parameter settings for both documentation and dummy solution generation

solver_info:
  name: "Unstruct MPM"
  numerical_method: "Unstructured Material Point Method with Taichi-based particle simulation"
  reference: "Taichi-based MPM simulation with configurable cases and parameters"

task_distribution:
  strategy: "benchmark"
  total_individuals: 72
  description: "3 profiles * 3 precision levels * (6 nx tasks + 6 n_part tasks + 12 cfl tasks) = 72 tasks"

precision_levels:
  high:
    energy_tolerance: 0.01
    var_threshold: 0.2
    description: "High precision energy convergence - very challenging"
  medium:
    energy_tolerance: 0.08
    var_threshold: 0.5
    description: "Medium precision energy convergence - challenging"
  low:
    energy_tolerance: 0.3
    var_threshold: 0.6
    description: "Low precision energy convergence - achievable"

profiles:
  num_profiles: 3
  # active_profiles: ["p1", "p2", "p3"]
  active_profiles: ["p1"]

# Target parameters for optimization
target_parameters:
  nx:
    search_type: "iterative+0-shot"
    initial_value: 20
    multiplication_factor: 2
    max_iteration_num: 4 # 20, 40, 80, 160
    non_target_parameters:
      n_part: [2, 4]
      cfl: 0.001

