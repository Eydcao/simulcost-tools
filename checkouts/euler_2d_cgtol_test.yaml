# Euler 2D Solver Checkout Configuration - CG Tolerance Test
# Testing only cg_tolerance parameter with values 1e-2, 1e-3, 1e-4

solver_info:
  name: "Euler 2D"
  numerical_method: "WENO5 reconstruction with TVD-RK3 time integration and advection-projection scheme"
  reference: "CSMPM_BOW framework for compressible Euler equations"

# Domain information for each profile (for agent prompt context)
domain_info:
  p1:
    name: "central_boom_2d"
    domain_size: [1.0, 1.0]  # Square domain
    aspect_ratio: 1.0
    description: "Central explosion in square domain"
  p2:
    name: "stair_flow_2d"
    domain_size: [1.0, 0.333]  # Wide domain
    aspect_ratio: 0.333  # 1/3
    description: "Stair flow in wide domain (1:3 aspect ratio)"
  p3:
    name: "Mach_Diamond"
    domain_size: [1.0, 0.5]  # Moderate domain
    aspect_ratio: 0.5  # 1/2
    description: "Mach diamond pattern in moderate domain (1:2 aspect ratio)"

task_distribution:
  strategy: "benchmark"
  total_individuals: 36  # 3 profiles × 1 target param × 3 precision levels × 4 non-target combos = 36 tasks

precision_levels:
  low:
    tolerance_rmse: 0.12  # Relaxed - captures n_grid 32->64 (~0.11), cfl 0.5->0.25 (~0.06)
    description: "Relaxed convergence for coarse grids"
  medium:
    tolerance_rmse: 0.08  # Moderate - captures n_grid 16->32 with loose cg_tol (~0.09), requires finer for others
    description: "Moderate convergence criteria"
  high:
    tolerance_rmse: 0.06  # Stringent - requires very fine grids or very small CFL
    description: "Stringent convergence for fine grids"

profiles:
  num_profiles: 3
  active_profiles: ["p1", "p2", "p3"]

# Parameter configurations for cg_tolerance only
target_parameters:
  cg_tolerance:
    description: "CG solver convergence tolerance for pressure projection step. Too tight leads to unnecessary iterations; too loose may cause divergence (typical range: 1e-9 to 1e-5)"
    search_type: "0-shot"
    search_values: [1.0e-2, 1.0e-3, 1.0e-4]  # Testing looser tolerances
    non_target_parameters:
      n_grid_x: [64, 128]  # Test with moderate and fine grids
      cfl: [0.5, 0.25]  # Test with standard and conservative CFL
