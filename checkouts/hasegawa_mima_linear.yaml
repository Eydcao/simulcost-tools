# Hasegawa-Mima Linear Solver Checkout Configuration
# This file centralizes all parameter settings for dummy solution generation

precision_levels:
  low:
    tolerance_rmse: 0.01
  medium:
    tolerance_rmse: 0.001
  high:
    tolerance_rmse: 0.0005

profiles:
  # Available profiles: p1 (monopole), p2 (dipole), p3 (sin_x_gauss_y), p4 (gauss_x_sin_y)
  active_profiles: ["p1", "p2", "p3", "p4"]

# Target parameter configurations
target_parameters:
  N:
    initial_value: 32
    multiplication_factor: 2
    max_iteration_num: 4  # Limits to N: 32, 64, 128, 256
    non_target_parameters:
      dt: [5.0, 10.0, 20.0, 40.0]
      cg_atol: [1e0, 1e-1, 1e-2, 1e-3, 1e-4]

  dt:
    initial_value: 40.0
    multiplication_factor: 0.5
    max_iteration_num: 4  # Limits to dt: 40,20,10,5
    non_target_parameters:
      N: [32, 64, 128, 256]
      cg_atol: [1e0, 1e-1, 1e-2, 1e-3, 1e-4]

  cg_atol:
    search_range: [1e-4, 1e-0]  # Search from coarse (1e0) to fine (1e-4)
    search_range_slice_num: 5
    non_target_parameters:
      N: [32, 64, 128, 256]
      dt: [5.0, 10.0, 20.0, 40.0]