# Hasegawa-Mima Linear Solver Checkout Configuration
# This file centralizes all parameter settings for both documentation and dummy solution generation

solver_info:
  name: "Hasegawa-Mima Linear"
  numerical_method: "RK4 time integration with CG solver for Helmholtz equation"
  analytical_method: "Spectral solution via 2D FFT"
  reference: "Hasegawa, A. & Mima, K. (1978). Pseudo-three-dimensional turbulence in magnetized nonuniform plasma."

task_distribution:
  strategy: "flexible_parameters"
  total_individuals: 135

precision_levels:
  low:
    tolerance_rmse: 0.001
    description: "Relaxed convergence criteria"
  medium:
    tolerance_rmse: 0.0005
    description: "Moderate convergence criteria"
  high:
    tolerance_rmse: 0.0002
    description: "Stringent convergence criteria"

profiles:
  num_profiles: 3
  # Available profiles: p1 (standard), p2 (high_resolution), p3 (fast)
  active_profiles: ["p1", "p2", "p3"]

# Parameter configurations for each target parameter
target_parameters:
  N:
    description: "Grid resolution - determines spatial accuracy and computational cost"
    search_type: "iterative+0-shot"
    initial_value: 128
    multiplication_factor: 2
    max_iteration_num: 5
    non_target_parameters:
      dt: [1.0, 5.0, 10.0]  # Different time step choices (smaller for accuracy)
      cg_atol: [1e-4, 1e-5, 1e-6]  # CG solver tolerance levels

  dt:
    description: "Time step size - controls temporal accuracy and numerical stability"
    search_type: "iterative+0-shot"
    initial_value: 10.0
    multiplication_factor: 0.5
    max_iteration_num: 6
    non_target_parameters:
      N: 128  # Fixed moderate resolution
      cg_atol: [1e-4, 1e-5, 1e-6]  # CG solver tolerance levels

  cg_atol:
    description: "Conjugate Gradient solver absolute tolerance - controls linear solver accuracy"
    search_type: "0-shot"
    search_range: [1e-8, 1e-3]
    search_range_slice_num: 6  # 6 logarithmically spaced values
    multiplication_factor: 2  # For internal N search
    max_iteration_num: 5       # For internal N search
    non_target_parameters:
      N: 128      # Fixed moderate resolution
      dt: [1.0, 5.0, 10.0]  # Different time step choices (smaller for accuracy)

# Profile definitions for different simulation scenarios
profile_definitions:
  p1:
    name: "standard"
    description: "Standard configuration with balanced accuracy/efficiency"
    L: 62.83185307179586  # 2*pi*10
    v_star: 0.02
    Dx: 5.0
    record_dt: 1000.0
    end_frame: 10

  p2:
    name: "high_resolution"
    description: "Higher resolution configuration for accuracy testing"
    L: 62.83185307179586
    v_star: 0.02
    Dx: 2.0  # Smaller initial condition scale
    record_dt: 500.0
    end_frame: 20

  p3:
    name: "fast"
    description: "Fast configuration for quick testing"
    L: 62.83185307179586
    v_star: 0.02
    Dx: 10.0  # Larger initial condition scale
    record_dt: 2000.0
    end_frame: 5